repos:
- repo: https://github.com/antonbabenko/pre-commit-terraform
  rev: v1.99.0 # Get the latest from: https://github.com/antonbabenko/pre-commit-terraform/releases
  hooks:
  - id: terraform_fmt
  - id: terraform_docs
    args:
      - --hook-config=--path-to-file=README.md
      - --hook-config=--add-to-existing-file=true
      - --hook-config=--create-file-if-not-exist=true
  - id: terraform_validate
    files: ^iac-612674025488-us-west-2/[^/]+\.tf$
  - id: terraform_tflint
    args:
      - --args=--only=terraform_deprecated_interpolation
      - --args=--only=terraform_deprecated_index
      - --args=--only=terraform_unused_declarations
      - --args=--only=terraform_comment_syntax
      - --args=--only=terraform_documented_outputs
      - --args=--only=terraform_documented_variables
      - --args=--only=terraform_typed_variables
      - --args=--only=terraform_module_pinned_source
      - --args=--only=terraform_naming_convention
      - --args=--only=terraform_required_version
      - --args=--only=terraform_required_providers
      - --args=--only=terraform_standard_module_structure
      - --args=--only=terraform_workspace_remote

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    args: ['--allow-multiple-documents']
    exclude: ^k8s/infrastructure/karpenter/.*\.yaml$  # Exclude Karpenter templates with variables
  - id: check-added-large-files
    exclude: ^frontend/src/assets/.*\.(gif|png|jpg|jpeg)$
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-executables-have-shebangs
  - id: check-shebang-scripts-are-executable

# Python 代码格式化和检查
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.8.4
  hooks:
  - id: ruff
    args: [--fix]
    files: ^backend/.*\.py$
  - id: ruff-format
    files: ^backend/.*\.py$

# Python 类型检查 (暂时禁用，等项目添加完整类型注解后再启用)
# - repo: https://github.com/pre-commit/mirrors-mypy
