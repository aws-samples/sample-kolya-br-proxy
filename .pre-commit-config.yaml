# Vue/TypeScript/JavaScript 代码检查 (使用本地 eslint)
- repo: local
  hooks:
  - id: eslint
    name: ESLint
    entry: bash -c 'cd frontend && npm run lint'
    language: system
    files: ^frontend/src/.*\.(vue|ts|js)$
    pass_filenames: false

# 敏感信息检测
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    args: ['--baseline', '.secrets.baseline']
    exclude: |
      (?x)^(
        .*\.lock$|
        .*lock\.yaml$|
        .*lock\.json$|
        .*\.tfstate$|
        .*\.tfstate\.backup$|
        .*\.terraform/.*$|
        .*/\.terraform/.*$|
        uv\.lock$|
        pnpm-lock\.yaml$|
        package-lock\.json$|
        yarn\.lock$
      )$

# AWS/敏感信息检测 (本地 hook，使用 uv 环境)
- repo: local
  hooks:
  - id: aws-secrets-check
    name: AWS Secrets Check
    entry: bash
    args:
      - -c
      - |
        # 检查 AWS Access Key ID 格式 (AKIA开头的20位)
        if grep -r -E "AKIA[0-9A-Z]{16}" --exclude-dir=.git --exclude-dir=.terraform --exclude-dir=.venv --exclude="*.tfstate*" --exclude="uv.lock" --exclude=".env" --exclude=".env.*" .; then
          echo "❌ AWS Access Key ID detected!"
          exit 1
        fi

        # 检查 AWS Secret Access Key 格式 (40位base64字符)
        if grep -r -E "aws_secret_access_key\s*[:=]\s*['\"][A-Za-z0-9/+=]{40}['\"]" --exclude-dir=.git --exclude-dir=.terraform --exclude-dir=.venv --exclude="*.tfstate*" --exclude="uv.lock" --exclude=".env" --exclude=".env.*" .; then
          echo "❌ AWS Secret Access Key detected!"
          exit 1
        fi

        # 检查其他常见的敏感信息模式
        if grep -r -E "(password|token|secret)\s*[:=]\s*['\"][^'\"]{12,}['\"]" --exclude-dir=.git --exclude-dir=.terraform --exclude-dir=.venv --exclude="*.tfstate*" --exclude="uv.lock" --exclude-dir=node_modules --exclude=".env" --exclude=".env.*" .; then
          echo "⚠️  Potential sensitive information detected! Please review."
          echo "If this is a false positive, you can add it to .secrets.baseline"
        fi

        echo "✅ No AWS credentials detected"
    language: system
    pass_filenames: false
    always_run: true
