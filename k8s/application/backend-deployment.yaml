apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: kbp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kbp
  labels:
    app: backend
spec:
  replicas: 2  # 高可用配置，提供负载均衡和故障转移
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend
      nodeSelector:
        karpenter.sh/nodepool: common-nodepool
      containers:
      - name: backend
        image: 612674025488.dkr.ecr.us-west-2.amazonaws.com/kolya-br-proxy-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        env:
        - name: KBR_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: database-url
        - name: KBR_JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: jwt-secret-key
        - name: KBR_MICROSOFT_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: microsoft-client-id
        - name: KBR_MICROSOFT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: microsoft-client-secret
        - name: KBR_MICROSOFT_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: microsoft-tenant-id
        - name: KBR_COGNITO_USER_POOL_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: cognito-user-pool-id
        - name: KBR_COGNITO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: cognito-client-id
        - name: KBR_COGNITO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: cognito-client-secret
        - name: KBR_COGNITO_REGION
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: cognito-region
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
